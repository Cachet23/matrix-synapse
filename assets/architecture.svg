<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 960 620" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">

  <!-- Background -->
  <rect width="960" height="620" fill="#0f172a"/>

  <!-- Title -->
  <text x="480" y="28" text-anchor="middle" font-size="18" font-weight="700" fill="#e5e7eb">Matrix Synapse — Self-Hosted Infrastructure</text>
  <text x="480" y="48" text-anchor="middle" font-size="12" fill="#94a3b8">Encrypted messaging for AI agents &amp; humans on own hardware</text>

  <!-- ═════════════════════════════════════════════════════ -->
  <!-- Zone: External (Cloudflare path) — left column         -->
  <!-- ═════════════════════════════════════════════════════ -->
  <rect x="20" y="70" width="320" height="220" rx="12" fill="#b4530918" stroke="#b45309" stroke-width="1" stroke-dasharray="5 3" opacity="0.6"/>
  <text x="35" y="90" font-size="11" fill="#b45309">External (via Cloudflare Tunnel)</text>

  <!-- Phone 1 -->
  <rect x="35" y="105" width="130" height="55" rx="10" fill="#6d28d9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="100" y="130" text-anchor="middle" font-size="14" font-weight="650" fill="#e5e7eb">User Phone</text>
  <text x="100" y="148" text-anchor="middle" font-size="11" fill="#a3adbd">Element X — E2EE</text>

  <!-- Phone 2 -->
  <rect x="190" y="105" width="130" height="55" rx="10" fill="#6d28d9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="255" y="130" text-anchor="middle" font-size="14" font-weight="650" fill="#e5e7eb">User Phone</text>
  <text x="255" y="148" text-anchor="middle" font-size="11" fill="#a3adbd">Element X — E2EE</text>

  <!-- Cloudflare Tunnel box -->
  <rect x="65" y="195" width="230" height="50" rx="10" fill="#b45309" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="180" y="217" text-anchor="middle" font-size="14" font-weight="650" fill="#e5e7eb">Cloudflare Tunnel</text>
  <text x="180" y="233" text-anchor="middle" font-size="11" fill="#a3adbd">TLS terminates — no open ports</text>

  <!-- Arrows: Phones → CF -->
  <path d="M 100 160 L 100 190 L 180 190 L 180 195" stroke="#b45309" stroke-width="2" fill="none"/>
  <path d="M 255 160 L 255 190 L 180 190" stroke="#b45309" stroke-width="2" fill="none"/>
  <!-- arrowhead -->
  <polygon points="180,195 176,189 184,189" fill="#b45309"/>

  <!-- Arrow: CF → Synapse (across zones) -->
  <path d="M 180 245 L 180 280 L 400 280 L 400 310" stroke="#b45309" stroke-width="2" fill="none" stroke-dasharray="8 4"/>
  <polygon points="400,310 396,304 404,304" fill="#b45309"/>

  <!-- ═════════════════════════════════════════════════════ -->
  <!-- Zone: Internal Network — right column                   -->
  <!-- ═════════════════════════════════════════════════════ -->
  <rect x="370" y="70" width="570" height="490" rx="12" fill="#16653422" stroke="#22c55e" stroke-width="1" stroke-dasharray="5 3" opacity="0.5"/>
  <text x="385" y="90" font-size="11" fill="#22c55e">Internal Network (no Cloudflare, no TLS needed)</text>

  <!-- Synapse -->
  <rect x="470" y="105" width="370" height="60" rx="10" fill="#0f766e" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="655" y="130" text-anchor="middle" font-size="15" font-weight="650" fill="#e5e7eb">Matrix Synapse</text>
  <text x="655" y="148" text-anchor="middle" font-size="11" fill="#a3adbd">Docker — localhost:8008 + internal interfaces</text>

  <!-- PostgreSQL -->
  <rect x="510" y="190" width="290" height="40" rx="10" fill="#334155" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="655" y="215" text-anchor="middle" font-size="14" font-weight="650" fill="#e5e7eb">PostgreSQL</text>

  <!-- Arrow: Synapse → Postgres -->
  <path d="M 655 165 L 655 190" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <polygon points="655,190 651,184 659,184" fill="#94a3b8"/>

  <!-- cloudflared (tunnel endpoint) -->
  <rect x="470" y="265" width="160" height="45" rx="10" fill="#b45309" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="550" y="285" text-anchor="middle" font-size="13" font-weight="650" fill="#e5e7eb">cloudflared</text>
  <text x="550" y="300" text-anchor="middle" font-size="10" fill="#a3adbd">systemd service</text>

  <!-- Arrow: CF Tunnel → cloudflared -->
  <path d="M 180 245 L 180 275 L 470 275 L 550 275 L 550 265" stroke="#94a3b8" stroke-width="1.5" fill="none"/>
  <polygon points="550,265 546,271 554,271" fill="#94a3b8"/>

  <!-- ═════════════════════════════════════════════════════ -->
  <!-- KVM Host zone                                            -->
  <!-- ═════════════════════════════════════════════════════ -->
  <rect x="390" y="335" width="530" height="210" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6 5" opacity="0.4"/>
  <text x="405" y="355" font-size="11" fill="#94a3b8">Your Server (KVM host)</text>

  <!-- AI Agent 1 (OpenClaw) -->
  <rect x="410" y="370" width="210" height="65" rx="10" fill="#1e3a5f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="515" y="393" text-anchor="middle" font-size="14" font-weight="650" fill="#e5e7eb">AI Agent</text>
  <text x="515" y="410" text-anchor="middle" font-size="11" fill="#a3adbd">OpenClaw Gateway</text>
  <text x="515" y="424" text-anchor="middle" font-size="10" fill="#a3adbd">→ localhost:8008</text>

  <!-- Arrow: Agent 1 → Synapse (green, internal) -->
  <path d="M 515 370 L 515 340 L 655 340 L 655 165" stroke="#22c55e" stroke-width="2" fill="none"/>
  <polygon points="655,165 651,171 659,171" fill="#22c55e"/>

  <!-- Guest VM zone -->
  <rect x="640" y="370" width="250" height="160" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6 5" opacity="0.4"/>
  <text x="655" y="390" font-size="11" fill="#94a3b8">Guest VM (KVM)</text>

  <!-- AI Agent 2 (Hermes) -->
  <rect x="660" y="400" width="210" height="65" rx="10" fill="#1e3a5f" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="765" y="423" text-anchor="middle" font-size="14" font-weight="650" fill="#e5e7eb">AI Agent</text>
  <text x="765" y="440" text-anchor="middle" font-size="11" fill="#a3adbd">Hermes Agent</text>
  <text x="765" y="454" text-anchor="middle" font-size="10" fill="#a3adbd">→ internal-ip:8008</text>

  <!-- Arrow: Agent 2 → Synapse (green, internal) -->
  <path d="M 765 400 L 765 340 L 655 340 L 655 165" stroke="#22c55e" stroke-width="2" fill="none"/>
  <!-- libvirt bridge label -->
  <rect x="690" y="330" width="70" height="18" rx="5" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="725" y="343" text-anchor="middle" font-size="9" fill="#22c55e">virbr0</text>

  <!-- ═════════════════════════════════════════════════════ -->
  <!-- Legend — bottom left                                    -->
  <!-- ═════════════════════════════════════════════════════ -->
  <rect x="20" y="320" width="280" height="260" rx="12" fill="none" stroke="#94a3b8" stroke-width="1" stroke-dasharray="6 5" opacity="0.4"/>
  <text x="35" y="340" font-size="12" font-weight="650" fill="#e5e7eb">Legend</text>

  <!-- CF path -->
  <line x1="35" y1="358" x2="75" y2="358" stroke="#b45309" stroke-width="2" stroke-dasharray="8 4"/>
  <polygon points="75,358 71,355 71,361" fill="#b45309"/>
  <text x="82" y="362" font-size="11" fill="#a3adbd">Cloudflare path (mobile clients)</text>

  <!-- Internal path -->
  <line x1="35" y1="380" x2="75" y2="380" stroke="#22c55e" stroke-width="2"/>
  <polygon points="75,380 71,377 71,383" fill="#22c55e"/>
  <text x="82" y="384" font-size="11" fill="#a3adbd">Internal path (bots, no CF)</text>

  <!-- Local connection -->
  <line x1="35" y1="402" x2="75" y2="402" stroke="#94a3b8" stroke-width="1.5"/>
  <polygon points="75,402 71,399 71,405" fill="#94a3b8"/>
  <text x="82" y="406" font-size="11" fill="#a3adbd">Local service connection</text>

  <!-- Color swatches — single column -->
  <rect x="35" y="425" width="14" height="14" rx="3" fill="#0f766e" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="436" font-size="11" fill="#a3adbd">Synapse (server)</text>

  <rect x="35" y="445" width="14" height="14" rx="3" fill="#1e3a5f" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="456" font-size="11" fill="#a3adbd">AI Agent (bot)</text>

  <rect x="35" y="465" width="14" height="14" rx="3" fill="#6d28d9" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="476" font-size="11" fill="#a3adbd">Mobile client (Element X)</text>

  <rect x="35" y="485" width="14" height="14" rx="3" fill="#b45309" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="496" font-size="11" fill="#a3adbd">Cloudflare (tunnel)</text>

  <rect x="35" y="505" width="14" height="14" rx="3" fill="#334155" stroke="#94a3b8" stroke-width="1"/>
  <text x="55" y="516" font-size="11" fill="#a3adbd">PostgreSQL (database)</text>

  <rect x="35" y="525" width="14" height="14" rx="3" fill="#0f172a" stroke="#22c55e" stroke-width="1"/>
  <text x="55" y="536" font-size="11" fill="#a3adbd">Internal network zone</text>

  <!-- Key insight text -->
  <text x="35" y="558" font-size="10" fill="#94a3b8" font-style="italic">What CF sees: two phones with mobile traffic.</text>
  <text x="35" y="572" font-size="10" fill="#94a3b8" font-style="italic">What CF doesn't see: bots, tokens, room memberships.</text>

</svg>
